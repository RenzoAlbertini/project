  <text x="314" y="316" fill="#D8DEEA" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Prompt</text>
  <rect x="314" y="330" width="402" height="132" rx="7" fill="#2B2C35"/>
  <text x="334" y="360" fill="#F0F3FA" font-family="Segoe UI, Arial, sans-serif" font-size="15">Create an intermediate study plan for Azure AI</text>
  <text x="334" y="384" fill="#F0F3FA" font-family="Segoe UI, Arial, sans-serif" font-size="15">agents. Duration: 4 weeks. Include weekly</text>
  <text x="334" y="408" fill="#F0F3FA" font-family="Segoe UI, Arial, sans-serif" font-size="15">milestones, exercises, and checkpoints.</text>

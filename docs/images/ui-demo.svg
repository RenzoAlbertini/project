  <text x="462" y="500" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Generate study plan</text>

  <text x="790" y="264" fill="#F6F8FF" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Output</text>
  <rect x="790" y="284" width="592" height="42" rx="7" fill="#124837"/>
  <text x="812" y="311" fill="#5DE08D" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Study plan generated</text>
  <text x="790" y="370" fill="#F4F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Intermediate Study Plan: Azure AI Agents (4 Weeks)</text>
  <line x1="790" y1="398" x2="1382" y2="398" stroke="#2A3A4F"/>
  <text x="790" y="438" fill="#F4F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Week 1: Foundations of Azure AI Agents</text>
  <text x="812" y="474" fill="#DCE4F2" font-family="Segoe UI, Arial, sans-serif" font-size="16">- Review Azure AI services relevant to conversational agents.</text>
  <text x="812" y="506" fill="#DCE4F2" font-family="Segoe UI, Arial, sans-serif" font-size="16">- Set up your Azure account and resource group.</text>
  <text x="812" y="538" fill="#DCE4F2" font-family="Segoe UI, Arial, sans-serif" font-size="16">- Learn intent, entities, and dialog management.</text>
  <line x1="790" y1="578" x2="1382" y2="578" stroke="#2A3A4F"/>
  <text x="790" y="620" fill="#F4F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Final Mini Project</text>
  <text x="812" y="656" fill="#DCE4F2" font-family="Segoe UI, Arial, sans-serif" font-size="16">Build a customer support bot with FAQ handling,</text>
  <text x="812" y="686" fill="#DCE4F2" font-family="Segoe UI, Arial, sans-serif" font-size="16">simulated authentication, and Teams deployment.</text>

  <text x="324" y="126" fill="#F6F8FF" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="800">AI Study Path Planner</text>
  <text x="324" y="168" fill="#D6DEEC" font-family="Segoe UI, Arial, sans-serif" font-size="17">An Azure Foundry + A2A workspace that turns a learning goal into a clear, practical study path.</text>
  <text x="324" y="194" fill="#D6DEEC" font-family="Segoe UI, Arial, sans-serif" font-size="17">Tune the goal, check the agents, and generate a plan ready to follow.</text>

  <text x="292" y="264" fill="#F6F8FF" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Request</text>
